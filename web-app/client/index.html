<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CityScape - Redescoperă Orașul tău</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #8BC34A;
            --dark-bg: #050505;
            --surface: #111111;
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
            --glow: 0 0 20px rgba(76, 175, 80, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ambient Glows */
        .glow-1 {
            position: fixed;
            top: -20%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(76, 175, 80, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .glow-2 {
            position: fixed;
            bottom: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 195, 74, 0.08) 0%, transparent 70%);
            z-index: -1;
        }

        /* --- Header --- */
        header {
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            width: 100%;
            z-index: 100;
        }

        .logo {
            font-weight: 700;
            font-size: 26px;
            letter-spacing: -1px;
            text-decoration: none;
            color: white;
        }

        .logo span { color: var(--primary); }

        /* --- Hero --- */
        .hero {
            position: relative;
            padding: 160px 8% 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            min-height: 100vh;
            justify-content: center;
        }

        .vibe-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            opacity: 0.4;
            background-image: url('vibe_bg.png');
            background-size: cover;
            background-position: center;
            filter: blur(5px);
        }
        
        .vibe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(5,5,5,0.7) 0%, var(--dark-bg) 95%);
            z-index: -1;
        }

        .hero h1 {
            font-size: clamp(42px, 8vw, 92px);
            font-weight: 700;
            line-height: 0.95;
            margin-bottom: 30px;
            letter-spacing: -3px;
        }

        .hero h1 span {
            display: block;
            color: var(--primary);
            filter: drop-shadow(var(--glow));
        }

        .hero p {
            max-width: 600px;
            font-size: clamp(16px, 2vw, 22px);
            color: var(--text-dim);
            margin-bottom: 50px;
            line-height: 1.4;
        }

        .cta-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-main {
            background: var(--primary);
            color: black;
            padding: 18px 45px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--glow);
        }

        .btn-main:hover {
            transform: scale(1.05);
            background: var(--secondary);
            box-shadow: 0 0 40px rgba(76, 175, 80, 0.6);
        }

        /* --- Mockups Section --- */
        .visuals {
            padding: 100px 8%;
            display: flex;
            justify-content: center;
            gap: 40px;
            perspective: 1000px;
        }

        .app-mock {
            width: 300px;
            height: 600px;
            background: var(--surface);
            border: 8px solid #222;
            border-radius: 40px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            transform: rotateY(-15deg) rotateX(5deg);
            overflow: hidden;
            transition: 0.6s;
        }

        .app-mock:hover {
            transform: rotateY(0deg) rotateX(0deg) scale(1.02);
        }

        .app-mock img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 32px;
        }

        /* --- Footer --- */
        footer {
            padding: 60px 8%;
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media (max-width: 768px) {
            .hero { padding-top: 120px; }
            .visuals { flex-direction: column; align-items: center; }
            .app-mock { transform: none; width: 260px; height: 520px; }
        }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <header>
        <a href="#" class="logo">City<span>Scape</span></a>
    </header>

    <section class="hero">
        <div class="vibe-bg"></div>
        <div class="vibe-overlay"></div>
        
        <h1>Descoperă <span>Aventura</span></h1>
        <p>Aplicația care transformă fiecare ieșire într-o poveste epică. AI, Sincronizare Group Calendar și Itinerarii Magice.</p>
        
        <div class="cta-group">
            <a href="#" class="btn-main">Începe Acum Gratuit</a>
        </div>
    </section>

    <section class="visuals">
        <div class="app-mock">
            <!-- Representing a real app screen vibe -->
            <img src="hero_vibe.png" alt="CityScape Discover">
        </div>
        <div class="app-mock" style="transform: rotateY(15deg) rotateX(5deg); margin-top: 40px;">
             <!-- Representing a calendar sync screen vibe -->
            <img src="vibe_bg.png" alt="CityScape Calendar">
        </div>
    </section>

    <footer>
        <p>&copy; 2026 CityScape. O experiență Mihaela Bogdan.</p>
    </footer>
</body>
</html>

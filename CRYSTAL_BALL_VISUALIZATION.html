<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 CityScape Crystal Ball</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #0d001a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .crystal-ball-section {
            background: rgba(20, 5, 40, 0.8);
            border: 2px solid #FF00FF;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            color: #FF00FF;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        #canvas-container {
            width: 100%;
            height: 500px;
            background: radial-gradient(circle, rgba(40, 0, 80, 0.5) 0%, rgba(0, 0, 0, 0.8) 100%);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .predictions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .prediction-card {
            background: rgba(30, 10, 50, 0.6);
            border: 1px solid #00FFFF;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .prediction-card:hover {
            background: rgba(30, 10, 50, 0.9);
            border-color: #FF00FF;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .prediction-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .prediction-type {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #00FFFF;
        }

        .prediction-confidence {
            font-size: 24px;
            color: #FF00FF;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #00FFFF, #FF00FF);
            border-radius: 5px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: glow-pulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 30px rgba(255, 0, 255, 0.3), inset 0 0 30px rgba(255, 0, 255, 0.1);
            }
            50% {
                box-shadow: 0 0 60px rgba(255, 0, 255, 0.5), inset 0 0 60px rgba(255, 0, 255, 0.2);
            }
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #00FFFF;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="crystal-ball-section">
            <h1>🔮 Crystal Ball Predictor</h1>

            <div id="canvas-container">
                <canvas id="crystal-ball-canvas"></canvas>
                <div class="glow-effect"></div>
            </div>

            <div class="predictions-grid" id="predictions">
                <div class="prediction-card">
                    <div class="prediction-icon">🏛️</div>
                    <div class="prediction-type">Museums</div>
                    <div class="prediction-confidence">65%</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: 65%"></div>
                    </div>
                </div>

                <div class="prediction-card">
                    <div class="prediction-icon">🌳</div>
                    <div class="prediction-type">Parks</div>
                    <div class="prediction-confidence">55%</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: 55%"></div>
                    </div>
                </div>

                <div class="prediction-card">
                    <div class="prediction-icon">🍽️</div>
                    <div class="prediction-type">Restaurants</div>
                    <div class="prediction-confidence">60%</div>
                    <div class="confidence-bar">
                        <div class="confidence-fill" style="width: 60%"></div>
                    </div>
                </div>
            </div>

            <div class="info-text">
                ✨ Predictions based on your exploration patterns ✨
            </div>
        </div>
    </div>

    <script>
        // Initialize Three.js scene
        const canvas = document.getElementById('crystal-ball-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });

        renderer.setSize(canvas.clientWidth, canvas.clientHeight);
        renderer.setClearColor(0x000000, 0.1);
        camera.position.z = 2.5;

        // Create crystal ball (sphere)
        const geometry = new THREE.IcosahedronGeometry(1, 4);
        const material = new THREE.MeshStandardMaterial({
            color: 0xFF00FF,
            metalness: 0.3,
            roughness: 0.1,
            emissive: 0x880088,
            wireframe: false
        });
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);

        // Add lights
        const mainLight = new THREE.PointLight(0xFF00FF, 1.5, 100);
        mainLight.position.set(3, 3, 3);
        scene.add(mainLight);

        const ambientLight = new THREE.AmbientLight(0x4a0080, 0.5);
        scene.add(ambientLight);

        const glowLight = new THREE.PointLight(0x00FFFF, 0.8, 100);
        glowLight.position.set(-3, -3, 3);
        scene.add(glowLight);

        // Particle system
        const particlesGeometry = new THREE.BufferGeometry();
        const particleCount = 200;
        const positions = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 4;      // x
            positions[i + 1] = (Math.random() - 0.5) * 4;  // y
            positions[i + 2] = (Math.random() - 0.5) * 4;  // z
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            color: 0xFF00FF,
            size: 0.05,
            sizeAttenuation: true,
            transparent: true,
            opacity: 0.6
        });

        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate sphere
            sphere.rotation.x += 0.002;
            sphere.rotation.y += 0.003;

            // Pulsing scale
            const scale = 1 + Math.sin(Date.now() * 0.001) * 0.1;
            sphere.scale.set(scale, scale, scale);

            // Rotate particles
            particles.rotation.x += 0.0005;
            particles.rotation.y += 0.0008;

            // Orbit lights
            const time = Date.now() * 0.0005;
            mainLight.position.set(Math.cos(time) * 3, Math.sin(time) * 2, Math.cos(time * 0.7) * 3);
            glowLight.position.set(Math.cos(time + Math.PI) * 3, Math.sin(time + Math.PI) * 2, Math.sin(time * 0.5) * 3);

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            const width = canvas.clientWidth;
            const height = canvas.clientHeight;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>
</html>
